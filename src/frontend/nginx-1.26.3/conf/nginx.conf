# Nginx 本地分流配置
# Vite 静态文件 (管理端/科研端/登录页) + Next.js 反代 (医生端)
#
# 使用方式：
#   已复制到 d:/frontend-merge/nginx-1.26.3/conf/nginx.conf
#   启动：cd d:/frontend-merge/nginx-1.26.3 && nginx.exe
#   停止：nginx.exe -s stop
#   重载：nginx.exe -s reload

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # ── 医生端：反向代理到 Next.js (next start, port 3000) ──────────
        location /doctor {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Next.js 内部静态资源 (_next/static 等)
        location /_next/ {
            proxy_pass       http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── API 反向代理到后端 ────────────────────────────────────────
        location /api/ {
            proxy_pass         ;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── 登录页 / 管理端 / 科研端：Vite 静态文件 ─────────────────────
        root ../frontend-vite/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
