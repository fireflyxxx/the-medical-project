spring.application.name=medical-imaging-system

# Server Configuration (Optional: change port if 8080 is occupied)
server.port=8080

# Database Configuration (假设都在 Docker 网络内，通过 docker-compose 的服务名互联)
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql-db}:${DB_PORT:3306}/medical_imaging_system?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8mb4
spring.datasource.username=root
# ⚠️ 注意: 请确认服务器上 MySQL root 的真实密码！
spring.datasource.password=${DB_PASSWORD:root123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ！！！重点修改：生产环境下禁止每次重启项目清空/覆盖数据表！！！
spring.sql.init.mode=never

# Upload size limits
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Custom AI Service Configuration
# 在 Docker-compose 环境下，AI 服务由于定义在 "services: ai:" 下，所以我们可以直接使用内部的服务名短号 "ai" 作为主机名。
medical.ai.service.url=http://${AI_HOST:ai}:${AI_PORT:8000}

# ！！！重点修改：在 Linux 服务器上的绝对物理路径，与 Python 容器挂载同一卷
# 请在服务器上手动执行: mkdir -p /opt/medical/models
medical.ai.models.upload-dir=/opt/medical/models/

# Redis 配置 (Docker-compose 中对应服务名通常为 redis)
mq.type=redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# Jackson JSON 时区
spring.jackson.time-zone=Asia/Shanghai

